<!-- partials/indicator-bar.html — Overlay toggle pills -->
<div class="indicator-bar">
    <span class="indicator-bar-label">Overlays</span>

    <button class="ind-toggle active" data-indicator="sma20" title="Simple Moving Average 20">SMA 20</button>
    <button class="ind-toggle" data-indicator="sma50" title="Simple Moving Average 50">SMA 50</button>
    <button class="ind-toggle" data-indicator="rsi" title="Relative Strength Index (14) — right axis">RSI</button>
    <button class="ind-toggle" data-indicator="macd" title="MACD + Signal line — right axis">MACD</button>
    <button class="ind-toggle" data-indicator="bb" title="Bollinger Bands (20, 2σ)">BB Bands</button>
    <button class="ind-toggle active" data-indicator="volume" title="Volume bars — bottom 20% of chart">Volume</button>

    <div class="indicator-bar-divider"></div>
    <span class="indicator-bar-hint">Click to toggle overlays</span>
</div>
