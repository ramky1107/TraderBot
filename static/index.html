<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Market Simulator</title>
    <meta name="description"
        content="Real-time stock chart with technical indicators, sentiment analysis, and AI chatbot." />

    <!-- ── CSS ──────────────────────────────────────────────────────────────── -->
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/toolbar.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
    <link rel="stylesheet" href="/static/css/sidebar.css" />
    <link rel="stylesheet" href="/static/css/signals.css" />
    <link rel="stylesheet" href="/static/css/chatbot.css" />

    <!-- ── Third-party (CDN) ────────────────────────────────────────────────── -->
    <!-- Plotly for the unified chart -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <!-- Socket.IO for real-time news -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

    <!-- ═══════════════════════════════════════════════════════════════════════════
     App Shell — mount points for dynamically loaded HTML partials.
     main.js fetches all partials in parallel and injects them here.
     ═══════════════════════════════════════════════════════════════════════════ -->
    <div id="app">

        <!-- Row 1: Toolbar (ticker, period, interval, buttons) -->
        <div id="mount-toolbar"></div>

        <!-- Row 2: Indicator toggle bar -->
        <div id="mount-indicator-bar"></div>

        <!-- Row 3: Chart + Sidebar -->
        <div class="main-content">

            <!-- Left: Plotly chart -->
            <div class="chart-container">
                <div id="chart"></div>
            </div>

            <!-- Right: Sidebar (injected into this mount) -->
            <div id="mount-sidebar"></div>

        </div>

    </div><!-- /#app -->

    <!-- Fixed bottom: signal action bar -->
    <div id="mount-signal-bar"></div>

    <!-- Fixed corner: chatbot widget -->
    <div id="mount-chatbot"></div>

    <!-- ── Application entry point (ES module) ──────────────────────────────────── -->
    <script type="module" src="/static/js/main.js"></script>

</body>

</html>
