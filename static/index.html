<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>

<body>
    <!-- Top Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="ticker-label">Ticker:</span>
            <input type="text" id="tickerInput" class="ticker-input" value="^NSEI" placeholder="Enter symbol...">
            <button id="fetchBtn" class="fetch-btn">Fetch Data</button>
        </div>
        <div class="toolbar-right">
            <span class="status-text" id="statusText">Ready</span>
        </div>
    </div>

    <!-- Main Content Area: Chart Left + Sidebar Right -->
    <div class="main-content">
        <!-- Chart Container (Left) -->
        <div class="chart-container">
            <div id="chart"></div>
        </div>

        <!-- Right Sidebar: Sentiment + News -->
        <div class="right-sidebar" id="sentimentPanel">
            <!-- Sentiment Score -->
            <div class="sidebar-section sentiment-score-section">
                <div class="sentiment-score-container">
                    <div class="sentiment-score-value" id="sentimentScoreValue">--</div>
                    <div class="sentiment-score-label" id="sentimentLabel">Loading...</div>
                </div>
                <div class="sentiment-meter">
                    <div class="sentiment-meter-bar">
                        <div class="sentiment-meter-fill" id="sentimentMeterFill"></div>
                        <div class="sentiment-meter-needle" id="sentimentNeedle"></div>
                    </div>
                    <div class="sentiment-meter-labels">
                        <span class="bearish-label">-100</span>
                        <span class="neutral-label">0</span>
                        <span class="bullish-label">+100</span>
                    </div>
                </div>
            </div>

            <!-- Live Price -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">LIVE PRICE</div>
                <div class="live-price-value" id="livePriceValue">--</div>
                <div class="live-price-change" id="livePriceChange">--</div>
            </div>

            <!-- Score Breakdown -->
            <div class="sidebar-section">
                <div class="sidebar-section-title">SCORE BREAKDOWN</div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Technical (5Y)</span>
                    <span class="breakdown-value" id="techScore">--</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">News</span>
                    <span class="breakdown-value" id="newsScore">--</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-label">Live Price</span>
                    <span class="breakdown-value" id="liveScore">--</span>
                </div>
            </div>

            <!-- News Headlines -->
            <div class="sidebar-section news-section">
                <div class="sidebar-section-title">LATEST NEWS</div>
                <div class="news-list" id="newsList">
                    <div class="news-placeholder">Loading news...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chatbot Widget -->
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-header">
            <span class="chatbot-title">📈 Stock Assistant</span>
            <button class="chatbot-close" id="chatbotClose">✕</button>
        </div>
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="chatbot-message bot-message">
                Hi! I'm your stock market assistant. Ask me anything about stocks, trading strategies, or technical
                indicators!
            </div>
        </div>
        <div class="chatbot-input-container">
            <input type="text" id="chatbotInput" class="chatbot-input" placeholder="Ask about stocks...">
            <button id="chatbotSend" class="chatbot-send">Send</button>
        </div>
    </div>

    <!-- Chatbot Toggle Button -->
    <button class="chatbot-toggle" id="chatbotToggle">
        💬
    </button>

    <script src="app.js"></script>
</body>

</html>
